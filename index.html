// ── LOCAL DAY (not UTC) ───────────────────────────────────────
function localDay() {
  var now = new Date();
  return new Date(now.getFullYear(), now.getMonth(), now.getDate()).getDay();
}

function todayStr() {
  var now = new Date();
  var y = now.getFullYear();
  var mo = now.getMonth() + 1;
  var d = now.getDate();
  return y + '-' + (mo < 10 ? '0' + mo : mo) + '-' + (d < 10 ? '0' + d : d);
}

function getInitialTab() {
  var d = localDay();
  if (d===1) return 0;
  if (d===3) return 1;
  if (d===5) return 2;
  if (d===2||d===6) return 1;
  if (d===4||d===0) return 2;
  return 0;
}

function getRestDayNotice() {
  var d = localDay();
  if (d===2) return "Today is Tuesday — next glute day is Wednesday!";
  if (d===4) return "Today is Thursday — next glute day is Friday!";
  if (d===6) return "Today is Saturday — rest day! Next glute day is Monday.";
  if (d===0) return "Today is Sunday — rest day! Next glute day is Monday.";
  return null;
}

// ── STORAGE ───────────────────────────────────────────────────
async function storageGet(key) {
  try { if (window.storage) { var r=await window.storage.get(key); return r?JSON.parse(r.value):null; } } catch(e) {}
  try { var v=localStorage.getItem(key); return v?JSON.parse(v):null; } catch(e) { return null; }
}
async function storageSet(key,val) {
  try { if (window.storage) { await window.storage.set(key,JSON.stringify(val)); return; } } catch(e) {}
  try { localStorage.setItem(key,JSON.stringify(val)); } catch(e) {}
}
async function storageList(prefix) {
  try { if (window.storage) { var r=await window.storage.list(prefix); return r?r.keys:[]; } } catch(e) {}
  try { var keys=[]; for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k&&k.startsWith(prefix))keys.push(k);} return keys; } catch(e) { return []; }
}
async function storageDelete(key) {
  try { if (window.storage) { await window.storage.delete(key); return; } } catch(e) {}
  try { localStorage.removeItem(key); } catch(e) {}
}

// ── HISTORY VIEW ──────────────────────────────────────────────
function HistoryView() {
  var d=useState(null),setData=d[1];d=d[0];
  var loading=useState(true),setLoading=loading[1];loading=loading[0];
  var refresh=useState(0),setRefresh=refresh[1];refresh=refresh[0];

  useEffect(function(){
    var cancelled=false;
    (async function(){
      setLoading(true);
      var keys=await storageList('bbb_');
      var byDate={};
      for(var i=0;i<keys.length;i++){
        var k=keys[i];
        var parts=k.replace('bbb_','').split('_');
        var date=parts[0],ex=parts.slice(1).join(' ').replace(/-/g,' ');
        var entries=await storageGet(k)||[];
        if(!byDate[date])byDate[date]={};
        byDate[date][ex]=entries;
      }
      if(!cancelled){setData(byDate);setLoading(false);}
    })();
    return function(){cancelled=true;};
  },[refresh]);

  async function delEntry(key,idx){
    var entries=await storageGet(key)||[];
    entries.splice(idx,1);
    if(entries.length){await storageSet(key,entries);}
    else{await storageDelete(key);}
    setRefresh(function(x){return x+1;});
  }

  if(loading) return React.createElement('div',{style:{textAlign:'center',color:'#9ca3af',fontSize:13,padding:'20px 0'}},'Loading history...');
  if(!d||!Object.keys(d).length) return React.createElement('div',{style:{textAlign:'center',color:'#6b7280',fontSize:13,padding:'30px 0'}},'No logs yet. Start logging your exercises to see history here!');

  var dates=Object.keys(d).sort(function(a,b){return b.localeCompare(a);});
  return React.createElement('div',null,
    dates.map(function(date){
      var exs=d[date];
      var friendly=new Date(date+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
      return React.createElement('div',{key:date,style:{background:'#1a0030',border:'1px solid #3b0764',borderRadius:12,marginBottom:12,overflow:'hidden'}},
        React.createElement('div',{style:{padding:'10px 14px',background:'#2a0050',fontSize:13,fontWeight:800,color:'#c084fc'}},'📅 '+friendly),
        React.createElement('div',{style:{padding:'10px 14px'}},
          Object.keys(exs).map(function(ex){
            var entries=exs[ex];
            var logKey='bbb_'+date+'_'+ex.replace(/\s+/g,'-');
            return React.createElement('div',{key:ex,className:'hist-block'},
              React.createElement('div',{className:'hist-date'},ex),
              entries.map(function(entry,idx){
                var capturedIdx=idx;
                var capturedKey=logKey;
                return React.createElement('div',{key:idx,className:'hist-row'},
                  React.createElement('span',null,(entry.sets?entry.sets+' sets':''),(entry.reps?' × '+entry.reps+' reps':''),(entry.weight?' @ '+entry.weight:'')),
                  React.createElement('span',{style:{display:'flex',alignItems:'center',gap:6}},
                    entry.note?React.createElement('span',{style:{color:'#9ca3af',fontStyle:'italic'}},entry.note):null,
                    React.createElement('span',{style:{color:'#6b7280'}},entry.time||''),
                    React.createElement('button',{className:'del',onClick:function(){delEntry(capturedKey,capturedIdx);}},'×')
                  )
                );
              })
            );
          })
        )
      );
    })
  );
}
